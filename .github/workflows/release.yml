---
name: release
on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
    tags: [v*.*.*]
  pull_request:
    types: [labeled]
permissions:
  contents: read
jobs:
  release:
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      # Bump version on merging Pull Requests with specific labels.
      # (bump:major,bump:minor,bump:patch)
      - id: bumpr
        if: "!startsWith(github.ref, 'refs/tags/')"
        # yamllint disable-line rule:line-length
        uses: haya14busa/action-bumpr@faf6f474bcb6174125cfc569f0b2e24cbf03d496  # ratchet:haya14busa/action-bumpr@v1.11.4

      # Update corresponding major and minor tag.
      # e.g. Update v1 and v1.2 when releasing v1.2.3
      # yamllint disable-line rule:line-length
      - uses: haya14busa/action-update-semver@7d2c558640ea49e798d46539536190aff8c18715  # ratchet:haya14busa/action-update-semver@v1.5.1
        if: '!steps.bumpr.outputs.skip'
        with:
          tag: ${{ steps.bumpr.outputs.next_version }}

      # Get tag name.
      - id: tag
        # yamllint disable-line rule:line-length
        uses: haya14busa/action-cond@94f77f7a80cd666cb3155084e428254fea4281fd  # ratchet:haya14busa/action-cond@v1.2.1
        with:
          cond: ${{ startsWith(github.ref, 'refs/tags/') }}
          if_true: ${{ github.ref }}
          if_false: ${{ steps.bumpr.outputs.next_version }}

      - id: changelog
        if: steps.tag.outputs.value != ''
        # yamllint disable-line rule:line-length
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # ratchet:orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip all

      # Create release
      - if: steps.tag.outputs.value != ''
        env:
          TAG_NAME: ${{ steps.tag.outputs.value }}
          BODY: ${{ steps.changelog.outputs.content }}
          # This token is provided by Actions, you do not need to create your
          # own token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${TAG_NAME}"
          -t "Release ${TAG_NAME/refs\/tags\//}"
          --notes "${BODY}"
  release-check:
    if: github.event.action == 'labeled'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Post bumpr status comment
        # yamllint disable-line rule:line-length
        uses: haya14busa/action-bumpr@faf6f474bcb6174125cfc569f0b2e24cbf03d496  # ratchet:haya14busa/action-bumpr@v1.11.4
